name: Update Paper Stats

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub stars
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const fetch = (url, options = {}) => new Promise((resolve, reject) => {
            const req = https.get(url, { headers: { 'User-Agent': 'paper-stats-bot', ...options.headers } }, res => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                if (res.statusCode >= 200 && res.statusCode < 300) {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    reject(new Error(`JSON parse error: ${e.message}`));
                  }
                } else {
                  reject(new Error(`HTTP ${res.statusCode}: ${data.slice(0, 200)}`));
                }
              });
            });
            req.on('error', reject);
          });

          const delay = ms => new Promise(r => setTimeout(r, ms));

          async function main() {
            const bib = fs.readFileSync('_bibliography/papers.bib', 'utf8');

            // Load existing stats (preserves citations)
            let stats = { github: {}, citations: {}, updated: '' };
            try {
              stats = JSON.parse(fs.readFileSync('_data/paper_stats.json', 'utf8'));
              console.log(`Loaded existing stats with ${Object.keys(stats.citations).length} citations (preserved)`);
            } catch (e) {
              console.log('No existing stats file, starting fresh');
            }

            // Extract GitHub repos from bib file
            const githubRegex = /code\s*=\s*\{https:\/\/github\.com\/([^\/]+)\/([^\/\}]+)/g;
            const repos = new Set();
            let match;
            while ((match = githubRegex.exec(bib)) !== null) {
              repos.add(`${match[1]}/${match[2]}`);
            }

            // Fetch GitHub stars
            console.log('\nFetching GitHub stars...');
            for (const repo of repos) {
              try {
                await delay(100);
                const data = await fetch(`https://api.github.com/repos/${repo}`, {
                  headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                if (typeof data.stargazers_count === 'number') {
                  stats.github[repo] = data.stargazers_count;
                  console.log(`${repo}: ${data.stargazers_count} stars`);
                }
              } catch (e) {
                console.error(`Failed to fetch ${repo}: ${e.message}`);
              }
            }

            stats.updated = new Date().toISOString();
            fs.mkdirSync('_data', { recursive: true });
            fs.writeFileSync('_data/paper_stats.json', JSON.stringify(stats, null, 2));
            console.log('\nSaved to _data/paper_stats.json');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/paper_stats.json
          git diff --staged --quiet || git commit -m "Update GitHub stars [skip ci]"
          git push
